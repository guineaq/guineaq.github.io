<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skill Tree Sample (No Connectors)</title>
  <style>
    .icon-grid {
  display: grid;
  grid-template-rows: repeat(3, 80px);   /* 3 rows, each 80px tall */
  grid-template-columns: repeat(3, 80px);/* 3 columns, each 80px wide */
  gap: 16px;                             /* space between icons */
  background: #232347;
  padding: 20px;
  width: max-content;
}

.icon {
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon img {
  width: 64px;
  height: 64px;
  object-fit: contain;
}
  </style>
</head>
<body>
  <div class="icon-grid">
  <div class="icon" style="grid-area: 1 / 1;"><img src="./res/food_tier_1.png" alt="Icon 1"></div>
  <div class="icon" style="grid-area: 1 / 3;"><img src="./res/food_tier_1.png" alt="Icon 2"></div>
  <div class="icon" style="grid-area: 2 / 2;"><img src="./res/food_tier_1.png" alt="Icon 3"></div>
  <div class="icon" style="grid-area: 3 / 1;"><img src="./res/food_tier_1.png" alt="Icon 4"></div>
  <div class="icon" style="grid-area: 3 / 3;"><img src="./res/food_tier_1.png" alt="Icon 5"></div>
</div>
</body>
</html>
